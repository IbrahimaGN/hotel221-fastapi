name: CI/CD — Full Pipeline to AWS EC2

on:
  push:
    branches:
      - main
      - ci/add-docker-workflow

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hotel221-fastapi:latest

  deploy-to-ec2:
    name: Deploy to AWS EC2 via SSH
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Execute SSH commands on AWS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/hotel221-fastapi:latest

            cd /home/ubuntu/hotel221-fastapi

            docker-compose down
            docker-compose up -d

            echo "Démarrage du Health Check sur le serveur AWS..."
            SUCCESS=0
            for i in {1..10}; do
              if curl -s http://localhost:8000/api-docs > /dev/null; then
                echo "✅ API OK"
                SUCCESS=1
                break
              fi
              echo "⏳ Attente API ($i/10)..."
              sleep 4
            done

            if [ $SUCCESS -eq 0 ]; then
              echo "❌ Health check failed"
              exit 1
            fi

      # -------------------------------
      # 📧 EMAIL NOTIFICATION SUCCESS
      # -------------------------------
      - name: Send Email Notification (SUCCESS)
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚀 Déploiement SUCCESS - Hotel221 API"
          to: ${{ secrets.EMAIL_TO }}
          from: "GitHub Actions <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            🎉 Déploiement réussi !

            ✔ Image Docker build & push OK
            ✔ EC2 mis à jour
            ✔ Health check validé

            🌍 API disponible ici :
            https://${{ secrets.EC2_HOST }}: ${{ secrets.EC2_PORT }}/docs

      # -------------------------------
      # ❌ EMAIL FAIL
      # -------------------------------
      - name: Send Email Notification (FAILURE)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ Déploiement FAILED - Hotel221 API"
          to: ${{ secrets.EMAIL_TO }}
          from: "GitHub Actions <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            ❌ Le déploiement a échoué.

            👉 Vérifie les logs GitHub Actions pour plus de détails.