name: CI — Build & Push Docker Image

# Déclencheur : uniquement sur push vers la branche principale
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Se connecter à Docker Hub avec les secrets GitHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Configurer Docker Buildx (builder multi-plateforme)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Builder et pusher l'image avec le SHA du commit comme tag
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel221-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hotel221-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Afficher un résumé dans les logs
      - name: Print image info
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Image: ${{ secrets.DOCKERHUB_USERNAME }}/hotel221-api"
          echo "🏷️  Tags:"
          echo "   - ${{ github.sha }}"
          echo "   - latest"
